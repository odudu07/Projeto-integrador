<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Alteração do Mural</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Alterar Mural</h1>

<textarea id="novoAviso"
placeholder="Digite o aviso"
rows="6"></textarea>

<br><br>

<button onclick="salvarAviso()">
Salvar Aviso
</button>

<br><br>

<p id="mensagem"></p>

<button onclick="window.location.href='tela-inicial.html'">
Voltar
</button>

</div>

<script>

function salvarAviso(){

    document.getElementById("mensagem").innerText =
    "Aviso atualizado com sucesso"
}

</script>

</body>
</html>
